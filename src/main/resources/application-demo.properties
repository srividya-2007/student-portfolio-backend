spring.datasource.url=${DB_URL:jdbc:h2:file:./data/portfolio_db;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Railway containers are ephemeral, so keep uploads in a writable temp path.
app.upload.dir=${APP_UPLOAD_DIR:/tmp/portfolio-uploads}
